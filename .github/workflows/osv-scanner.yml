name: OSV Scanner

on:
  pull_request:
    branches:
      - main
      - development
  merge_group:
    branches:
      - main
      - development
  push:
    branches:
      - main
      - development
  schedule:
    - cron: "30 12 * * 1"
  workflow_dispatch:

permissions: read-all

jobs:
  scan:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Run OSV Scanner
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.1
        with:
          scan-args: |-
            --recursive
            ./
