name: OSV Scanner

on:
  pull_request:
    branches:
      - main
      - development
  merge_group:
    branches:
      - main
      - development
  push:
    branches:
      - main
      - development
  schedule:
    - cron: "30 12 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  scan-pr:
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.1

  scan-full:
    if: github.event_name != 'pull_request' && github.event_name != 'merge_group'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.0
    with:
      scan-args: |-
        --recursive
        ./
