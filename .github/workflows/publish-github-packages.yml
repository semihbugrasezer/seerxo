name: Publish to GitHub Packages

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://npm.pkg.github.com'
          scope: '@semihbugrasezer'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Prepare package bundle
        run: node scripts/prepare-github-package.mjs "$RUNNER_TEMP/github-package"

      - name: Publish package
        working-directory: ${{ runner.temp }}/github-package
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
