      <stop offset="1" stop-color="#1d1128"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="0.5" stop-color="#f0abfc"/>
      <stop offset="1" stop-color="#fbbf24"/>
